              input:
                type: string
                value: DeepSeek-V3.2
            - name: modelType
              input:
                type: integer
                value: "1764929611"
            - name: maxCompletionTokens
              input:
                type: string
                value: "0"
            - name: parameters
              input:
                type: object
                value: null
            - name: prompt
              input:
                type: string
                value: |-
                    文案内容如下：
                    {{content}}
            - name: enableChatHistory
              input:
                type: boolean
                value: false
            - name: chatHistoryRound
              input:
                type: integer
                value: "3"
            - name: systemPrompt
              input:
                type: string
                value: |-
                    # 角色
                    你是一位专业且富有创意的视频分镜描述专家，专注于3分钟读完一本书视频文案的分镜创作，能够将书籍内容转化为生动、形象且符合要求的视频分镜描述。

                    ## 技能
                    ### 技能 1: 创作视频分镜描述
                    1. 仔细研读用户提供的3分钟读完一本书的视频文案内容，全面理解其中的书籍核心内容、情节发展以及情感氛围等关键要素。
                    2. 按照要求创作视频分镜描述，确保：
                        - 字幕文案分段：每个段落均由一句话构成，语句简洁明了，表达清晰流畅，同时具备节奏感。
                        - 分镜描述：画面需能准确体现书籍内容情节，描述要精准、细致地展现情节细节以及情感氛围等方面。
                        - 字幕文案必须严格按照用户给的文案拆分，不能修改提供的内容。
                        - 分镜数量至少8个， 不超过50个。
                    ### 技能 2: 生成分镜图像提示词
                    - 依据分镜描述和整本书的内容，生成对应的[分镜图像提示词]
                    - 风格描述：
                    人物：卡通化、简洁线条
                    背景：符号化、扁平化设计（如房子、信用卡、存钱罐等）
                    色调：柔和、明亮、低饱和度
                    动作：简单但富有表现力（如抓头、思考、惊讶等）
                    细节：用简单的图形和线条表现复杂概念（如箭头、货币符号等）
                    -示例：一个人正在思考财务问题，周围有存钱罐、信用卡、房子、下降箭头等符号。
                    提示词风格参考：
                    “一个年轻人正在抓头思考，周围有存钱罐、信用卡、房子、下降箭头等符号，卡通化风格，柔和色调，简洁线条，表情夸张，背景用扁平化符号表现，整体风格轻松幽默。”

                    ### 技能3: 挑选文案中重点词
                    - 依据原始文案，从文案中截取对应的重点词汇，输出keywords
                    - 注意直接截取出原有词，不要带标点符号，且要在句子中存在

                    ### 技能4：输出内容
                    输出包含分镜名称、分镜描述、字幕文案、图像提示词的内容，具体格式如下：
                    {
                     "list":[
                    {
                        "story_name":"分镜名称",
                        "desc":"分镜描述",
                        "cap":"对应字幕文案",
                        "desc_promopt":"分镜图像提示词"
                    }
                    ],
                    "keywords":["重点词1","重点词2"]
                    }

                    ## 限制
                    - 视频文案及分镜描述必须保持一致。
                    - 输出内容必须严格按照给定的格式进行组织，不得偏离框架要求。
                    - 只对用户提供的3分钟读完一本书的视频文案内容进行分镜，不能更改原文。
                    - 分镜图像提示词要符合整本书和当前段落的语境。
                    - 输出的keywords必须在对应句子中存在。
            - name: stableSystemPrompt
              input:
                type: string
                value: ""
            - name: canContinue
              input:
                type: boolean
                value: false
            - name: loopPromptVersion
              input:
                type: string
                value: ""
            - name: loopPromptName
              input:
                type: string
                value: ""
            - name: loopPromptId
              input:
                type: string
                value: ""
        node_inputs:
            - name: content
              input:
                type: string
                value:
                    path: content
                    ref_node: "132962"
        node_outputs:
            keywords:
                type: list
                items:
                    type: string
                    value: null
                value: null
            list:
                type: list
                items:
                    type: object
                    properties:
                        cap:
                            type: string
                            value: null
                        desc:
                            type: string
                            value: null
                        desc_promopt:
                            type: string
                            value: null
                        story_name:
                            type: string
                            value: null
                    value: null
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 600000
