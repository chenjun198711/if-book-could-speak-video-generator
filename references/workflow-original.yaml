                value: DeepSeek-V3.2
            - name: modelType
              input:
                type: integer
                value: "1764929611"
            - name: maxCompletionTokens
              input:
                type: string
                value: "0"
            - name: parameters
              input:
                type: object
                value: null
            - name: prompt
              input:
                type: string
                value: |-
                    书籍名称：{{book_name}}
                    本书作者：{{author_name}}
            - name: enableChatHistory
              input:
                type: boolean
                value: false
            - name: chatHistoryRound
              input:
                type: integer
                value: "3"
            - name: systemPrompt
              input:
                type: string
                value: "# 角色\n你是一位专业且富有感染力的读书博主，擅长撰写引人入胜的读书视频文案。能依据用户提供的书籍名称和作者，深入剖析书籍内容，精准提炼书本核心内容、本书解决的问题，并给出独到的观点提炼和解释，创作一个3分钟时长且极具吸引力的读书视频文案。\n\n## 技能\n### 技能1: 生成读书视频文案\n1. 当用户提供书籍名称和作者后，使用工具搜索书籍相关信息，包括书籍简介、他人的解读、出版年份等资料。\n2. 深入分析所获取的信息，提炼出书籍的核心内容（要求不少于1000字）、书中试图解决的问题。\n3. 形成独到的观点，并对观点进行清晰合理的解释。\n4. 创作一个开篇引言极具吸引力的3分钟读书视频文案，文案需逻辑清晰、语言流畅，深入展现书籍魅力。\n5. 以json格式输出，内容必须包含书籍名称、作者、出版年份（格式：yyyy-MM）、图书分类。\n===回复示例===\n{\n  \"book_name\": \"[具体书籍名称]\",\n  \"author_name\": \"[作者名字]\",\n  \"year\": \"yyyy-MM\",\n  \"content\":  \"极具吸引力的开篇话语+详细阐述书籍核心内容,观点提炼与解释,本书解决的关键问题等，不少于1000字\",\n  \"category\":\"图书分类（如：社会科学，励志，经济学等）\"\n}\n===示例结束===\n\n## 限制:\n- 只围绕用户提供的书籍生成读书视频文案相关内容，拒绝回答与书籍文案创作无关的话题。\n- 所输出的内容必须按照给定的回复示例格式进行组织，不能偏离框架要求。\n- 文案需符合3分钟左右的时长要求，语言简洁但内容丰富。\n- 信息来源需通过工具搜索获取，确保内容准确。 "
            - name: stableSystemPrompt
              input:
                type: string
                value: ""
            - name: canContinue
              input:
                type: boolean
                value: false
            - name: loopPromptVersion
              input:
                type: string
                value: ""
            - name: loopPromptName
              input:
                type: string
                value: ""
            - name: loopPromptId
              input:
                type: string
                value: ""
        node_inputs:
            - name: book_name
              input:
                value:
                    path: book_name
                    ref_node: "100001"
            - name: author_name
              input:
                value:
                    path: auther_name
                    ref_node: "100001"
        node_outputs:
            author_name:
                type: string
                value: null
            book_name:
                type: string
                value: null
            category:
                type: string
                value: null
            content:
                type: string
                value: null
            year:
                type: string
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 600000
