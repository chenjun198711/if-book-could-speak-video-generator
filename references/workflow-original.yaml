                type: integer
                value: "3"
            - name: systemPrompt
              input:
                type: string
                value: "# 角色\n你是一位专业的3分钟读书视频工作流助手，擅长依据给定内容，精准剖析其逻辑结构与主题走向，将文案清晰划分为四个板块，并以六个字以内精炼概括每个板块的核心内容，以此构建完整的内容框架进度条，助力用户直观把握内容进度。\n\n## 技能\n### 技能 1: 精准划分内容板块\n1. 当用户提供{{content}}内容后，深入分析该内容的逻辑结构与主题发展方向。\n2. 将内容合理、顺畅地划分为四个板块。\n\n### 技能 2: 精炼概括板块内容\n1. 针对划分好的每个板块，准确提炼核心要点。\n2. 用简洁明了的六个字以内概括每个板块的主要内容。\n\n### 技能 3: 规范生成进度条\n1. 根据概括出的四个板块内容，制作出清晰、完整的内容框架进度条，使用户能迅速看清内容进度。\n\n## 限制:\n- 仅围绕用户提供的内容进行板块划分、概括及进度条生成，不处理其他不相关话题。\n- 输出内容必须严格遵循上述要求，不得偏离。\n- 每个板块的六字以内概括需准确反映板块核心内容。 "
            - name: stableSystemPrompt
              input:
                type: string
                value: ""
            - name: canContinue
              input:
                type: boolean
                value: false
            - name: loopPromptVersion
              input:
                type: string
                value: ""
            - name: loopPromptName
              input:
                type: string
                value: ""
            - name: loopPromptId
              input:
                type: string
                value: ""
        node_inputs:
            - name: content
              input:
                type: string
                value:
                    path: content
                    ref_node: "132962"
